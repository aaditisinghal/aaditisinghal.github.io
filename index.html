<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaditi Singhal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
        <div class="shape shape5"></div>
        <div class="shape shape6"></div>
    </div>

    <main>
        <section id="home" class="active-section">
            <div class="container welcome-container">
                <h1 class="animate-title">Hi! I'm Aaditi Singhal</h1>
                <p class="subtitle animate-subtitle">Welcome to my narrative journey</p>
                <div class="button-group">
                    <a href="page.html" class="cta-button animate-button">
                        <i class="fas fa-book-open"></i>
                        Read My Story
                    </a>
                    <a href="page2.html" class="devpost-button animate-button">
                        <i class="fas fa-feather"></i>
                        Read My Poetry
                    </a>
                </div>
                <div class="social-links">
                    <a href="mailto:asinghal@gatech.edu" class="social-link" title="Email">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/aaditi-singhal" target="_blank" class="social-link" title="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/aaditisinghal" target="_blank" class="social-link" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://devpost.com/software/aa-x395vj" target="_blank" class="social-link" title="AAROLIC Project">
                        <i class="fas fa-code"></i>
                    </a>
                </div>
            </div>
        </section>

        <footer class="copyright-footer">
            <div class="footer-content">
                <div class="copyright-text">
                    2024 Aaditi Singhal • All rights reserved
                </div>
            </div>
        </footer>
    </main>

    <script>
        // Animation for initial load
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.animate-title, .animate-subtitle, .animate-button, .social-link').forEach((element, index) => {
                element.style.animation = `fadeInUp 0.6s ${index * 0.2}s forwards`;
            });
        });
    </script>
</body>
</html>
